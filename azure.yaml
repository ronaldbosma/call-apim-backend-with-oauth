# yaml-language-server: $schema=https://raw.githubusercontent.com/Azure/azure-dev/main/schemas/v1.0/azure.yaml.json

name: call-apim-backend-with-oauth
metadata:
  template: tdd-call-apim-backend-with-oauth@1.7.3
hooks:
  postprovision:
    - shell: pwsh
      run: ./hooks/postprovision-create-and-store-client-certificate.ps1
      interactive: true
    - shell: pwsh
      run: ./hooks/postprovision-create-and-store-client-secret.ps1
      interactive: true
    - shell: pwsh
      run: ./hooks/postprovision-deploy-apis.ps1
      interactive: true
  predown:
    - shell: pwsh
      run: ./hooks/predown-remove-app-registrations.ps1
      interactive: true
requiredVersions:
  azd: ">= 1.23.15" # azd version 1.23.15 or higher is required because we're using features from Bicep 0.42.1.
